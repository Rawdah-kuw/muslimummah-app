name: iOS build check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Regenerate iOS platform folder
        run: flutter create --platforms=ios --org app --project-name muslimummah .
      - name: Get packages
        run: flutter pub get
      - name: Build unsigned iPhone app
        run: flutter build ios --release --no-codesign
