name: Verify build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Regenerate native platform folders
        run: flutter create --platforms=android --org app --project-name muslimummah .

      - name: Get packages
        run: flutter pub get

      - name: Analyze (informational)
        run: flutter analyze
        continue-on-error: true

      - name: Compile check (debug APK)
        run: flutter build apk --debug
